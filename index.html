<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Project Intake Portal</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
display:flex;
justify-content:center;
padding:40px;
}

.container{
background:white;
padding:30px;
width:600px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

input,textarea{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
}

button{
padding:12px 20px;
background:#2563eb;
color:white;
border:none;
cursor:pointer;
font-size:16px;
}

#status{
margin-top:20px;
font-weight:bold;
}
</style>

</head>

<body>

<div class="container">

<h2>AI Project Intake Portal</h2>

<input id="name" placeholder="Client Name">

<input id="email" placeholder="Email">

<textarea
id="request"
rows="8"
placeholder="Describe your project"></textarea>

<button onclick="submitProject()">
Submit Project
</button>

<div id="status"></div>

</div>

<script>

async function submitProject(){

document.getElementById("status").innerHTML="Processing...";

const response=await fetch(
"https://navithae.app.n8n.cloud/webhook-test/project-request",
{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({

name:document.getElementById("name").value,

email:document.getElementById("email").value,

request:document.getElementById("request").value

})
});

const data=await response.text();

document.getElementById("status").innerHTML=
"✅ Request Submitted Successfully";

}

</script>

</body>
</html>
